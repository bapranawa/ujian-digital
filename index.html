<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Digital SDN Karangrejek I Wonosari</title>
    <style>
        :root { --primary: #1a73e8; --secondary: #fbbc04; --danger: #d93025; --bg: #f1f3f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 950px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-info { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        
        .exam-layout { display: none; grid-template-columns: 1fr 280px; gap: 20px; align-items: start; }
        .question-area { background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px; min-height: 450px; }
        
        .nav-panel { 
            background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; 
            position: sticky; top: 20px; max-height: 90vh; overflow-y: auto; 
        }

        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .num-btn { padding: 10px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; text-align: center; font-weight: bold; transition: 0.2s; }
        .num-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .num-btn.filled { background: #e8f0fe; color: var(--primary); border-color: var(--primary); }
        .num-btn.doubt { background: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }
        
        .option { display: flex; align-items: center; border: 2px solid #eee; margin-bottom: 12px; padding: 15px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .option.selected { border-color: var(--primary); background: #e8f0fe; font-weight: bold; }
        .opt-letter { font-weight: bold; margin-right: 12px; color: var(--primary); }
        .q-img { max-width: 100%; height: auto; border-radius: 8px; margin: 15px 0; display: block; border: 1px solid #ddd; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-yellow { background: var(--secondary); }
        .btn-red { background: var(--danger); width: 100%; margin-top: 20px; }
        .btn-toggle { background: #607d8b; width: 100%; margin-bottom: 10px; display: none; }
        .btn-reset { background: #f0f0f0; color: #d93025; width: 100%; margin-top: 20px; font-size: 11px; border: 1px solid #ddd; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .modal-btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }

        input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        @media (max-width: 768px) { .exam-layout { grid-template-columns: 1fr; } .nav-panel { position: relative; top: 0; display: none; } .btn-toggle { display: block; } }
    </style>
</head>
<body>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <h3 id="modalTitle" style="margin-top:0; color:var(--primary);">Pemberitahuan</h3>
        <p id="modalMsg" style="white-space: pre-line; font-size: 16px; line-height: 1.5;"></p>
        <div id="modalFooter" class="modal-btn-group">
            <button class="btn btn-blue" onclick="closeModal()">Oke</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="login-sec">
        <div class="header-info"><h2>UJIAN ONLINE</h2><h3>INPUT IDENTITAS</h3></div>
        <label>Pilih Sekolah:</label>
        <select id="stuSekolah">
            <option value="SDN KARANGREJEK I">SDN KARANGREJEK I</option>
            <option value="SDN LAIN">SDN LAIN</option>
        </select>
        <label>Nama Lengkap:</label><input type="text" id="stuName">
        <label>Nomor Absen:</label><input type="number" id="stuNo">
        <label>Mata Pelajaran:</label>
        <select id="stuMapel">
            <option value="BAHASA INDONESIA">BAHASA INDONESIA</option>
            <option value="IPAS">IPAS</option>
            <option value="MATEMATIKA">MATEMATIKA</option>
        </select>
        <button class="btn btn-blue" style="width:100%" onclick="mulai()">MULAI UJIAN</button>
        <p id="resume-hint" style="display:none; color:green; text-align:center; font-size:12px; margin-top:10px;"><i>Draf ditemukan. Melanjutkan sesi sebelumnya...</i></p>
    </div>

    <div id="exam-sec" class="exam-layout">
        <div class="question-area">
            <button class="btn btn-toggle" onclick="toggleNav()">Daftar Nomor</button>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <b id="q-num" style="color:var(--primary); font-size:1.1em;">Soal No. 1</b>
                <b id="timer" style="color:var(--danger)">00:00</b>
            </div>
            <div id="q-text" style="font-size:18px; margin-bottom:20px"></div>
            <div id="opt-area"></div>
            <div style="display:flex; justify-content:space-between; margin-top:20px">
                <button class="btn btn-blue" onclick="nav(-1)">Kembali</button>
                <button class="btn btn-yellow" onclick="toggleDoubt()">Ragu-Ragu</button>
                <button class="btn btn-blue" onclick="nav(1)">Lanjut</button>
            </div>
        </div>
        <div class="nav-panel" id="nav-panel">
            <h4 style="margin:0">Navigasi Nomor</h4>
            <div id="num-grid" class="num-grid"></div>
            <button class="btn btn-red" onclick="cekSebelumSelesai()">SELESAI & KIRIM</button>
            <button class="btn btn-reset" onclick="resetSemuaDraf()">HAPUS SEMUA DRAF JAWABAN</button>
        </div>
    </div>

    <div id="result-sec" style="display:none; text-align:center">
        <h2>HASIL UJIAN</h2>
        <h1 id="skor-akhir" style="font-size:80px; color:var(--primary)">0</h1>
        <div id="info-pribadi" style="margin-bottom: 20px; font-weight: bold; line-height: 1.6;"></div>
        <div id="stat-kirim" style="font-weight:bold; padding:15px; border-radius:8px;">Mengirim jawaban...</div>
    </div>
</div>

<script>
    const databaseSoal = `
1. Organ pernapasan manusia adalah?
Paru-paru *
Jantung
Hati
Ginjal

2. Perhatikan gambar! Ini adalah planet? [IMG: https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg]
Mars *
Venus
Bumi
Merkurius

3. Bagian mata yang berfungsi untuk mengatur jumlah cahaya yang masuk ke dalam mata adalah? [IMG: https://awsimages.detik.net.id/community/media/visual/2023/05/15/ilustrasi-tata-surya.jpeg?w=1200]
Iris *
Pupil
Retina
Lensa

4. Peristiwa penguapan air laut menjadi awan dalam siklus air disebut dengan istilah?
Evaporasi *
Kondensasi
Presipitasi
Infiltrasi

5. Sebuah bangun ruang memiliki 6 sisi yang sama luas, 12 rusuk sama panjang, dan 8 titik sudut. Bangun tersebut adalah?
Kubus *
Balok
Prisma segitiga
Limas segiempat

6. Perhatikan gambar hewan di bawah ini! Hewan tersebut berkembang biak dengan cara? [IMG: https://awsimages.detik.net.id/community/media/visual/2023/05/15/ilustrasi-tata-surya.jpeg?w=1200]
Vivipar *
Ovipar
Ovovivipar
Fragmentasi

7. Tokoh proklamator bangsa Indonesia yang juga dikenal sebagai Bapak Koperasi adalah?
Drs. Moh. Hatta *
Ir. Soekarno
Sayuti Melik
Fatmawati

8. Hasil dari perhitungan matematis -15 + (-10) x 2 adalah?
-35 *
-50
-25
5

9. Planet yang memiliki cincin paling indah dan merupakan planet terbesar kedua di tata surya adalah? [IMG: https://awsimages.detik.net.id/community/media/visual/2023/05/15/ilustrasi-tata-surya.jpeg?w=1200]
Saturnus *
Yupiter
Uranus
Neptunus

10. Bentuk kerja sama negara-negara di Asia Tenggara dalam bidang ekonomi adalah?
AFTA *
SEAMEO
ZOPFAN
ADMM

11. Akar pangkat tiga dari bilangan 2.744 adalah?
14 *
12
16
18

12. Perhatikan gambar rangkaian listrik berikut! Jika saklar S1 diputus dan S2 disambung, maka lampu yang tetap menyala adalah? [IMG: https://awsimages.detik.net.id/community/media/visual/2023/05/15/ilustrasi-tata-surya.jpeg?w=1200]
Lampu 3 dan 4 *
Lampu 1 dan 2
Semua lampu padam
Semua lampu menyala
    `;

    const scriptURL = 'https://script.google.com/macros/s/AKfycbz27rLVhszqr7cqHFacyhYislQLzaYx7AQb_3YXxHr2JvX7-K-cQxqYl9LIw6z84m3Zkg/exec';
    let quizData = [], answers = [], doubtStatus = [], current = 0, timer, totalSec = 75 * 60;
    let isGracePeriod = false;

    window.onload = () => {
        databaseSoal.trim().split(/\n\s*\n/).forEach(block => {
            let lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
            let q = lines[0], opts = [], key = "";
            for(let i=1; i<lines.length; i++) {
                let txt = lines[i].replace('*','').trim();
                if(lines[i].includes('*')) key = txt;
                opts.push(txt);
            }
            quizData.push({q, opts: opts.sort(() => Math.random() - 0.5), key});
        });

        if(localStorage.getItem('wonosari_name')) {
            document.getElementById('resume-hint').style.display = 'block';
            document.getElementById('stuName').value = localStorage.getItem('wonosari_name');
            document.getElementById('stuNo').value = localStorage.getItem('wonosari_no');
            document.getElementById('stuSekolah').value = localStorage.getItem('wonosari_sekolah') || "SDN KARANGREJEK I";
            answers = JSON.parse(localStorage.getItem('wonosari_ans')) || new Array(quizData.length).fill(null);
            doubtStatus = JSON.parse(localStorage.getItem('wonosari_doubt')) || new Array(quizData.length).fill(false);
            totalSec = parseInt(localStorage.getItem('wonosari_time')) || (75 * 60);
        } else {
            answers = new Array(quizData.length).fill(null);
            doubtStatus = new Array(quizData.length).fill(false);
        }
    };

    function showModal(title, msg, onOk = null, showCancel = false) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        const footer = document.getElementById('modalFooter');
        footer.innerHTML = "";
        if(showCancel) {
            let btnBatal = document.createElement("button");
            btnBatal.className = "btn"; btnBatal.style.background = "#ccc"; btnBatal.innerText = "Batal";
            btnBatal.onclick = closeModal; footer.appendChild(btnBatal);
        }
        let btnOk = document.createElement("button");
        btnOk.className = "btn btn-blue"; btnOk.innerText = "Oke";
        btnOk.onclick = () => { closeModal(); if(onOk) onOk(); };
        footer.appendChild(btnOk);
        document.getElementById('customModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function mulai() {
        const s = document.getElementById('stuSekolah').value;
        const n = document.getElementById('stuName').value;
        const a = document.getElementById('stuNo').value;
        const m = document.getElementById('stuMapel').value;
        if(!n || !a) return showModal("Peringatan", "Isi Nama dan Absen!");
        document.getElementById('login-sec').style.display = 'none';
        document.getElementById('exam-sec').style.display = 'grid';
        localStorage.setItem('wonosari_sekolah', s);
        localStorage.setItem('wonosari_name', n);
        localStorage.setItem('wonosari_no', a);
        localStorage.setItem('wonosari_mapel', m);
        tampil();
        timer = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        totalSec--;
        localStorage.setItem('wonosari_time', totalSec);
        let m = Math.floor(Math.abs(totalSec)/60), s = Math.abs(totalSec)%60;
        let display = `${m}:${s<10?'0'+s:s}`;
        if (totalSec > 0) {
            document.getElementById('timer').innerText = display;
        } else {
            if (!isGracePeriod) {
                isGracePeriod = true;
                totalSec = 5 * 60; 
                showModal("Waktu Habis", "Waktu habis! Kamu diberikan 5 menit tambahan untuk memeriksa jawaban.");
            }
            document.getElementById('timer').innerText = "TAMBAHAN: " + display;
            if (totalSec <= 0) {
                clearInterval(timer);
                showModal("Waktu Selesai", "Waktu tambahan habis. Jawaban dikirim otomatis.", () => selesai(true));
            }
        }
    }

    function tampil() {
        let d = quizData[current];
        document.getElementById('q-num').innerText = "Soal No. " + (current + 1);
        document.getElementById('q-text').innerHTML = d.q.replace(/\[IMG:\s*(.*?)\]/g, '<img src="$1" class="q-img">');
        let html = "";
        d.opts.forEach((o, i) => {
            html += `<div class="option ${answers[current]===o?'selected':''}" onclick="pilih('${o}')">
                <span class="opt-letter">${String.fromCharCode(65+i)}.</span>${o}</div>`;
        });
        document.getElementById('opt-area').innerHTML = html;
        renderNav();
    }

    function pilih(v) { 
        answers[current] = v; 
        localStorage.setItem('wonosari_ans', JSON.stringify(answers));
        tampil(); 
    }

    function toggleDoubt() {
        doubtStatus[current] = !doubtStatus[current];
        localStorage.setItem('wonosari_doubt', JSON.stringify(doubtStatus));
        renderNav();
    }

    function renderNav() {
        let html = "";
        for(let i=0; i<quizData.length; i++){
            let cls = "num-btn" + (i===current?" active":"") + (doubtStatus[i]?" doubt":(answers[i]?" filled":""));
            html += `<div class="${cls}" onclick="current=${i};tampil()">${i+1}</div>`;
        }
        document.getElementById('num-grid').innerHTML = html;
    }

    function cekSebelumSelesai() {
        let kosong = [];
        answers.forEach((ans, idx) => { if (!ans) kosong.push(idx + 1); });
        if (kosong.length > 0) {
            showModal("Belum Lengkap", "Nomor belum diisi: " + kosong.join(", ") + "\nCek kembali agar semua terisi.");
        } else {
            showModal("Konfirmasi", "Yakin ingin mengirim jawaban sekarang?", () => selesai(), true);
        }
    }

    function nav(v) { 
        let t = current + v; 
        if(t>=0 && t<quizData.length) { current = t; tampil(); }
    }

    function toggleNav() {
        let p = document.getElementById('nav-panel');
        p.style.display = (p.style.display==='block')?'none':'block';
    }

    function resetSemuaDraf() {
        showModal("Konfirmasi", "Hapus SEMUA draf jawaban?", () => { localStorage.clear(); location.reload(); }, true);
    }

    function selesai(force = false) {
        clearInterval(timer);
        const sekolah = localStorage.getItem('wonosari_sekolah');
        const nama = localStorage.getItem('wonosari_name');
        const absen = localStorage.getItem('wonosari_no');
        const mapel = localStorage.getItem('wonosari_mapel');
        
        document.getElementById('exam-sec').style.display = 'none';
        document.getElementById('result-sec').style.display = 'block';
        
        // PERBAIKAN: Menampilkan Mapel di Notif Akhir
        document.getElementById('info-pribadi').innerText = `${sekolah}\n${nama} | Absen: ${absen}\nMapel: ${mapel}`;
        
        let benar = 0, rincian = [];
        quizData.forEach((q, i) => {
            if(answers[i] === q.key) benar++;
            rincian.push(`No${i+1}:${answers[i]||'-'}`);
        });
        let skor = Math.round((benar/quizData.length)*100);
        document.getElementById('skor-akhir').innerText = skor;
        
        fetch(scriptURL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({
                sekolah: sekolah,
                nama: nama,
                absen: absen,
                mapel: mapel,
                nilai: skor,
                analisis: rincian.join(" | ")
            })
        }).then(() => {
            document.getElementById('stat-kirim').innerHTML = "✅ DATA BERHASIL TERKIRIM";
            localStorage.clear();
        });
    }
</script>
</body>
</html>
